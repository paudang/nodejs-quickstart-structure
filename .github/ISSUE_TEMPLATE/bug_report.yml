name: Bug Report
description: Create a report to help us improve the generator
title: "[BUG] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: checkboxes
    id: terms
    attributes:
      label: Search for existing issues
      description: Please search the existing issues to ensure the bug hasn't been reported already.
      options:
        - label: I have searched the existing issues
          required: true
  - type: input
    id: version
    attributes:
      label: Generator Version
      description: What version of nodejs-quickstart-structure are you using? (e.g., 2.7.0)
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      description: e.g., Windows 11, macOS 13, Ubuntu 22.04
    validations:
      required: true
  - type: input
    id: node_version
    attributes:
      label: Node.js Version
      description: Output of `node -v`
    validations:
      required: true
  - type: dropdown
    id: architecture
    attributes:
      label: Architecture Selected
      options:
        - MVC
        - Clean Architecture
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Please provide clear and concise steps to reproduce the behavior.
      placeholder: |
        1. Run `npx nodejs-quickstart-structure@latest init`
        2. Select 'Clean Architecture'
        3. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? (Include terminal logs/errors)
    validations:
      required: true
