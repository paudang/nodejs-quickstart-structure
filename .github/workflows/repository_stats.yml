name: Repository Traffic Tracker

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch Stats and Push to Output Branch
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # 1. Setup Git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 2. Fetch traffic data from GitHub API
          mkdir -p stats-data
          curl -H "Authorization: token $GH_TOKEN" \
               -H "Accept: application/vnd.github.v3+json" \
               https://api.github.com/repos/${{ github.repository }}/traffic/clones \
               > stats-data/clones-$(date +%Y-%m-%d).json

          # 3. Handle the 'output' branch
          # Check if branch exists on remote
          if git ls-remote --exit-code --heads origin output; then
            git fetch origin output
            git checkout output
          else
            git checkout --orphan output
            git rm -rf .
          fi

          # 4. Move data and Commit
          mkdir -p traffic-history
          mv stats-data/* traffic-history/
          
          git add traffic-history/
          git commit -m "Update clone stats for $(date +%Y-%m-%d)"
          git push origin output
