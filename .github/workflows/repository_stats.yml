name: Repository Traffic Tracker

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering for testing

jobs:
  run-stats:
    name: Fetch and Store Stats
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential for the bot to create/push to the output branch

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Traffic Statistics
        uses: JstnMcBrd/repo-stats@v1
        with:
          # Your Personal Access Token stored in Secrets
          token: ${{ secrets.GH_TOKEN }}
          # The branch where data will be stored (created automatically)
          data-branch: output
