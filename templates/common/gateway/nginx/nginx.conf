# ==============================================================================
# Enterprise Nginx Gateway Configuration
# ==============================================================================
# This configuration is hardened for production, adhering to Big Tech standards.
# It acts as a Reverse Proxy, Rate Limiter, and Security Layer for the Node.js App.

worker_processes auto; # Automatically scale workers based on CPU cores

events {
    # Allows a high number of simultaneous connections per worker
    worker_connections 4096;
    multi_accept on; # Accept multiple connections simultaneously
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --------------------------------------------------------------------------
    # 1. Performance & Optimization
    # --------------------------------------------------------------------------
    sendfile on;           # Zero-copy file transfers (efficient static file delivery)
    tcp_nopush on;         # Optimize sending headers and files
    tcp_nodelay on;        # Send data immediately, no Nagle's algorithm delay
    keepalive_timeout 65;  # Keep connections open for reuse (reduces latency)
    
    # Hide Nginx version from response headers (Security: Information Disclosure)
    server_tokens off;

    # Gzip Compression: Reduces payload size by up to 70%, improving response time
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # --------------------------------------------------------------------------
    # 2. Security: DDoS Protection & Rate Limiting
    # --------------------------------------------------------------------------
    # Allocate 10MB of memory for tracking IPs (~160,000 IPs). Limit to 10 requests/sec.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    
    # Prevent large payload attacks (e.g., massive file uploads crashing the server)
    client_max_body_size 10M; 

    # --------------------------------------------------------------------------
    # 3. Upstream Configuration (Load Balancing)
    # --------------------------------------------------------------------------
    upstream node_app {
        # 'app' resolves to the Node.js container via Docker's internal DNS
        server app:3000;
        
        # Optional: Add multiple servers here for Round-Robin Load Balancing
        # server app2:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # --------------------------------------------------------------------------
        # 4. Security Headers (OWASP Best Practices)
        # --------------------------------------------------------------------------
        # Prevent Clickjacking (disallow embedding in malicious iframes)
        add_header X-Frame-Options "SAMEORIGIN" always;
        # Force browsers to block detected XSS attacks
        add_header X-XSS-Protection "1; mode=block" always;
        # Prevent MIME-type sniffing (forces browser to respect Content-Type)
        add_header X-Content-Type-Options "nosniff" always;
        # Control referrer information sent to external sites
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        # Strict CSP: Only allow resources from the same origin by default
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self'" always;

        # --------------------------------------------------------------------------
        # 5. Reverse Proxy Routing
        # --------------------------------------------------------------------------
        location / {
            # Apply Rate Limiting: Allow bursts of up to 20 requests without delay
            limit_req zone=api_limit burst=20 nodelay;
            
            # Forward requests to the upstream Node.js application
            proxy_pass http://node_app;
            
            # Support WebSockets (Next.js, Socket.io, etc.)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            
            # Forward Original Client IP and Protocol information to Node.js
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Proxy Timeouts (prevent hanging requests)
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
